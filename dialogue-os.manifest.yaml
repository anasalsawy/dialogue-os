name: Dialogue OS
owner: Anas Alsawy
version: "0.2"
status: public-normative-specification
canonical_room:
  current_adapter: telegram-private-group
  publication_adapter: telegram-channel
  transport_agnostic_core: true
normative_entrypoint: DIALOGUE_OS_BOOTSTRAP.md
amendments: AMENDMENTS.md
precedence:
  - human_current_explicit_instruction
  - latest_ratified_amendment
  - more_specific_binding_codex_law
  - later_binding_codex_law_of_equal_specificity
  - constitution
  - normative_runtime_specifications
  - informative_documents_and_examples
normative_documents:
  - CONSTITUTION.md
  - AMENDMENTS.md
  - DIALOGUE_OS_BOOTSTRAP.md
  - codex/book-xiii-order-of-the-room/README.md
  - docs/canonical-application-standard.md
  - docs/communication-governor-runtime-spec.md
  - docs/persistence-and-speech-only-governance-spec.md
  - docs/execution-governor-runtime-spec.md
schemas:
  agent_manifest: schemas/agent-manifest.schema.json
  mission_packet: schemas/mission-packet.schema.json
  governance_state: schemas/governance-state.schema.json
conformance:
  index: conformance/README.md
  tests: conformance/canonical-tests.md
reference_profiles:
  prefect_v3: docs/prefect-v3-reference-profile.md
public_private_boundary:
  public:
    - doctrine
    - normative_non_secret_specifications
    - schemas
    - conformance_tests
    - framework_reference_profiles
  private:
    - deployable_runtime_code
    - credentials
    - internal_prompts
    - live_logs
    - account_configuration
    - customer_data
    - payment_data
    - operational_secrets
compatibility:
  minimum_level_for_claim: 2
  backward_compatible_with: ["0.1"]
